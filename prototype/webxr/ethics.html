<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>伦理思考 · 地球之殇</title>
  <link rel="stylesheet" href="./css/xr-ui.css" />
</head>
<body class="xr-page">
  <header class="xr-page-header">
    <section class="xr-lang-switch xr-page-lang" aria-label="Language">
      <button type="button" data-ethics-lang="zh" aria-pressed="true">中文</button>
      <button type="button" data-ethics-lang="en" aria-pressed="false">EN</button>
    </section>
    <h1 data-ethics-i18n="title">伦理思考与反思日志</h1>
    <p data-ethics-i18n="lead">去灭绝技术并不只是“能不能做到”的问题，也涉及资源分配、生态风险、证据不确定性和公众参与。这里的滑块用于帮助你比较不同立场；反思内容只保存在本地浏览器。</p>
    <nav class="xr-nav">
      <a href="./index.html" data-ethics-i18n="navPlanet">星球首页</a>
      <a href="./destinations.html">物种全表</a>
      <a href="../hero.html" data-ethics-i18n="navHero">重点案例</a>
    </nav>
  </header>

  <main class="xr-panel" style="max-width:760px;">
    <section class="xr-block">
      <h3 data-ethics-i18n="tradeTitle">去灭绝技术的取舍</h3>
      <label class="xr-field-label"><span data-ethics-i18n="budgetLabel">去灭绝研究投入优先级：</span><span id="budget-value">50</span></label>
      <input class="xr-range" type="range" id="budget" min="0" max="100" value="50" />
      <label class="xr-field-label"><span data-ethics-i18n="riskLabel">生态不确定性的接受程度：</span><span id="risk-value">30</span></label>
      <input class="xr-range" type="range" id="risk" min="0" max="100" value="30" />
      <p id="ethics-output" class="xr-lead"></p>
    </section>

    <section class="xr-block">
      <h3>反思日志</h3>
      <textarea id="reflection-input" class="xr-textarea" rows="5" placeholder="当一个物种从地球上消失，我们应该如何记住它、解释它，并避免新的消失？"></textarea>
      <div class="xr-button-row">
        <button type="button" id="save-reflection" class="xr-pill" data-ethics-i18n="save">保存</button>
        <button type="button" id="load-reflection" class="xr-pill" data-ethics-i18n="load">载入</button>
      </div>
      <p id="reflection-status" class="xr-muted" style="margin-top:8px;"></p>
    </section>
  </main>

  <script type="module">
    import { initEthicsPage } from "./js/xr-ethics.js";
    window.ETHICS_COPY = {
      zh: {
        title: "伦理思考与反思日志",
        pageTitle: "伦理思考 · 地球之殇",
        lead: "去灭绝技术并不只是“能不能做到”的问题，也涉及资源分配、生态风险、证据不确定性和公众参与。这里的滑块用于帮助你比较不同立场；反思内容只保存在本地浏览器。",
        navPlanet: "星球首页",
        navHero: "重点案例",
        tradeTitle: "去灭绝技术的取舍",
        budgetLabel: "去灭绝研究投入优先级：",
        riskLabel: "生态不确定性的接受程度：",
        placeholder: "当一个物种从地球上消失，我们应该如何记住它、解释它，并避免新的消失？",
        save: "保存",
        load: "载入"
      },
      en: {
        title: "Ethics Decision & Reflection Log",
        pageTitle: "Ethics & Reflection — WebXR Prototype",
        lead: "A lightweight transition from emotional immersion to reasoned trade-offs: resources, risk, uncertainty communication, and a reflection saved only in this browser.",
        navPlanet: "Planet Home",
        navHero: "Classic Hero Layer",
        tradeTitle: "Ethics Fork · De-extinction Trade-offs",
        budgetLabel: "De-extinction budget priority: ",
        riskLabel: "Ecological uncertainty tolerance: ",
        placeholder: "When a biological rhythm disappears from Earth, what does collective absence mean to you?",
        save: "Save",
        load: "Load"
      }
    };

    window.setEthicsLanguage = function setEthicsLanguage(lang) {
      const selected = window.ETHICS_COPY[lang] ? lang : "zh";
      const copy = window.ETHICS_COPY[selected];
      document.documentElement.lang = selected === "zh" ? "zh-Hans" : "en";
      document.title = copy.pageTitle;
      document.querySelectorAll("[data-ethics-i18n]").forEach((node) => {
        const key = node.dataset.ethicsI18n;
        if (typeof copy[key] === "string") node.textContent = copy[key];
      });
      document.getElementById("reflection-input").placeholder = copy.placeholder;
      document.querySelectorAll("[data-ethics-lang]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.ethicsLang === selected));
      });
      localStorage.setItem("ea-lang", selected);
      localStorage.setItem("prototype-lang", selected);
      localStorage.setItem("xr-lang", selected);
      localStorage.setItem("ethics-lang", selected);
      window.dispatchEvent(new CustomEvent("ethics:languagechange", { detail: { lang: selected } }));
    };

    document.querySelectorAll("[data-ethics-lang]").forEach((button) => {
      button.addEventListener("click", () => window.setEthicsLanguage(button.dataset.ethicsLang));
    });
    window.setEthicsLanguage(localStorage.getItem("ea-lang") || localStorage.getItem("ethics-lang") || "zh");
    initEthicsPage();
  </script>
</body>
</html>
